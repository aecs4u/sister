# Cloud Build configuration with Docker BuildKit for GAR/GitHub authentication.
# Generated for Lighthouse-compatible Cloud Run deployment.
# Usage: gcloud builds submit --config cloudbuild.yaml .

steps:
  - name: "gcr.io/cloud-builders/gcloud"
    id: "generate-tokens"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud auth print-access-token > /workspace/.gar-token
        gcloud secrets versions access latest --secret=GITHUB_TOKEN --project=apps-aecs4u > /workspace/.github-token 2>/dev/null || echo "" > /workspace/.github-token
        echo "Tokens generated"

  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    entrypoint: "bash"
    env:
      - "DOCKER_BUILDKIT=1"
    args:
      - "-c"
      - |
        GITHUB_TOKEN=$$(cat /workspace/.github-token)
        GAR_TOKEN=$$(cat /workspace/.gar-token)
        docker build \
          --build-arg GITHUB_TOKEN="$$GITHUB_TOKEN" \
          --build-arg GAR_TOKEN="$$GAR_TOKEN" \
          --target runtime \
          --progress=plain \
          -t europe-west1-docker.pkg.dev/apps-aecs4u/cloud-run-source-deploy/sister-service:latest \
          -t europe-west1-docker.pkg.dev/apps-aecs4u/cloud-run-source-deploy/sister-service:cache \
          -t europe-west1-docker.pkg.dev/apps-aecs4u/cloud-run-source-deploy/sister-service:$BUILD_ID \
          .

  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - "push"
      - "--all-tags"
      - "europe-west1-docker.pkg.dev/apps-aecs4u/cloud-run-source-deploy/sister-service"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "sister-service"
      - "--image=europe-west1-docker.pkg.dev/apps-aecs4u/cloud-run-source-deploy/sister-service:latest"
      - "--region=europe-west1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--ingress=all"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--max-instances=3"
      - "--min-instances=0"
      - "--concurrency=80"
      - "--execution-environment=gen2"
      - "--port=8080"
      - "--timeout=300"
      - "--cpu-boost"
      - "--cpu-throttling"
      - "--set-env-vars=ENVIRONMENT=production,DEBUG=false,LOG_LEVEL=INFO,SISTER_DB_PATH=/app/data/sister.sqlite,SISTER_OUTPUTS_DIR=/app/outputs,BROWSER_HEADLESS=true,REQUIRE_AUTHENTICATION=true,USE_CLERK_AUTH=true,CLERK_AFTER_SIGN_IN_URL=/web/,CLERK_AFTER_SIGN_UP_URL=/web/"
      - "--update-secrets=SECRET_KEY=SISTER_SECRET_KEY:latest,SESSION_SECRET_KEY=SISTER_SECRET_KEY:latest,API_KEY=SISTER_API_KEY:latest,SHUTDOWN_API_KEY=SISTER_SHUTDOWN_API_KEY:latest,ADE_USERNAME=SISTER_ADE_USERNAME:latest,ADE_PASSWORD=SISTER_ADE_PASSWORD:latest,ADE_AUTH_METHOD=SISTER_ADE_AUTH_METHOD:latest,ADE_SPID_PROVIDER=SISTER_ADE_SPID_PROVIDER:latest,GOOGLE_CLIENT_ID=SISTER_GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=SISTER_GOOGLE_CLIENT_SECRET:latest,NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=SISTER_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:latest,CLERK_SECRET_KEY=SISTER_CLERK_SECRET_KEY:latest,CLERK_JWKS_URL=SISTER_CLERK_JWKS_URL:latest,LOGFIRE_TOKEN=SISTER_LOGFIRE_TOKEN:latest"

images:
  - "europe-west1-docker.pkg.dev/apps-aecs4u/cloud-run-source-deploy/sister-service"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: "1800s"
