name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [production, staging]
        default: production

env:
  GCP_PROJECT_ID: apps-aecs4u
  GCP_REGION: europe-west1
  SERVICE_NAME: sister-service
  IMAGE_BASE: europe-west1-docker.pkg.dev/apps-aecs4u/cloud-run-source-deploy/sister-service

jobs:
  deploy:
    name: Build, push & deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Fetch GitHub token for private package reads
        run: |
          GH_PAT=$(gcloud secrets versions access latest \
            --secret=GITHUB_TOKEN --project=${{ env.GCP_PROJECT_ID }})
          echo "::add-mask::${GH_PAT}"
          echo "BUILD_GITHUB_TOKEN=${GH_PAT}" >> "$GITHUB_ENV"

      - name: Compute image tag
        id: img
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to Artifact Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          build-args: |
            GITHUB_TOKEN=${{ env.BUILD_GITHUB_TOKEN }}
            GAR_TOKEN=${{ steps.auth.outputs.access_token }}
          tags: |
            ${{ env.IMAGE_BASE }}:sha-${{ steps.img.outputs.sha_short }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_BASE }}:sha-${{ steps.img.outputs.sha_short }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --platform=managed \
            --service-account=sister-runtime@apps-aecs4u.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --ingress=all \
            --memory=512Mi \
            --cpu=1 \
            --max-instances=3 \
            --min-instances=0 \
            --concurrency=80 \
            --execution-environment=gen2 \
            --port=8080 \
            --timeout=300 \
            --cpu-boost \
            --cpu-throttling \
            --set-env-vars=ENVIRONMENT=production,DEBUG=false,LOG_LEVEL=INFO,SISTER_DB_PATH=/app/data/sister.sqlite,SISTER_OUTPUTS_DIR=/app/outputs,BROWSER_HEADLESS=true,REQUIRE_AUTHENTICATION=true,USE_CLERK_AUTH=true,CLERK_AFTER_SIGN_IN_URL=/web/,CLERK_AFTER_SIGN_UP_URL=/web/ \
            --update-secrets=SECRET_KEY=SISTER_SECRET_KEY:latest,SESSION_SECRET_KEY=SISTER_SECRET_KEY:latest,API_KEY=SISTER_API_KEY:latest,SHUTDOWN_API_KEY=SISTER_SHUTDOWN_API_KEY:latest,ADE_USERNAME=SISTER_ADE_USERNAME:latest,ADE_PASSWORD=SISTER_ADE_PASSWORD:latest,ADE_AUTH_METHOD=SISTER_ADE_AUTH_METHOD:latest,ADE_SPID_PROVIDER=SISTER_ADE_SPID_PROVIDER:latest,GOOGLE_CLIENT_ID=SISTER_GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=SISTER_GOOGLE_CLIENT_SECRET:latest,NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=SISTER_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:latest,CLERK_SECRET_KEY=SISTER_CLERK_SECRET_KEY:latest,CLERK_JWKS_URL=SISTER_CLERK_JWKS_URL:latest,LOGFIRE_TOKEN=SISTER_LOGFIRE_TOKEN:latest

      - name: Get Cloud Run URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "🚀 Deployed to: $SERVICE_URL"

      - name: Run health check
        run: |
          URL="${{ steps.get-url.outputs.url }}"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$URL/health" || echo 000)
            echo "attempt $i: /health -> $CODE"
            [ "$CODE" = "200" ] && { echo "✅ Health check passed"; exit 0; }
            sleep 6
          done
          echo "❌ /health did not return 200 after 12 attempts"; exit 1
